<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications - EmoLab-AI</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .year-section + .year-section {
            margin-top: 40px;
        }

        .year-title {
            margin: 0 0 20px;
            color: var(--primary-color);
            font-size: 2rem;
        }

        .publication-list {
            display: grid;
            gap: 18px;
        }

        .publication-card {
            display: flex;
            gap: 24px;
            padding: 22px;
            align-items: stretch;
            min-height: 0;
        }

        .publication-media {
            width: 40%;
            flex: 0 0 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            overflow: hidden;
            background: linear-gradient(180deg, #eef4ff 0%, #f6f8fc 100%);
            border: 1px solid rgba(74, 74, 158, 0.08);
            aspect-ratio: 4 / 3;
        }

        .publication-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .publication-media img.publication-image--contain {
            object-fit: contain;
            background: #fff;
        }

        .publication-body {
            min-width: 0;
            flex: 0 0 60%;
            width: 60%;
            padding-top: 0;
        }

        .publication-title {
            margin: 0 0 16px;
            font-size: clamp(1.28rem, 1.65vw, 1.72rem);
            line-height: 1.3;
            letter-spacing: -0.01em;
            font-family: Georgia, "Times New Roman", serif;
            font-weight: 400;
        }

        .publication-title a {
            color: #163a70;
            text-decoration: none;
        }

        .publication-title a:hover {
            text-decoration: underline;
        }

        .publication-authors {
            margin: 0 0 12px;
            color: #111111;
            line-height: 1.65;
            font-size: 1.08rem;
        }

        .publication-venue {
            margin: 0 0 18px;
            color: #5f6677;
            font-size: 1rem;
            line-height: 1.55;
        }

        .publication-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pub-link,
        .show-abstract-btn {
            border: 1.5px solid #2b64ff;
            border-radius: 10px;
            padding: 8px 16px;
            background: #fff;
            color: #2b64ff;
            text-decoration: none;
            cursor: pointer;
            font: inherit;
            font-size: 1rem;
            line-height: 1;
            transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        }

        .pub-link:hover,
        .show-abstract-btn:hover {
            background: #2b64ff;
            color: #fff;
        }

        .publication-abstract {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            color: var(--muted-text-color);
            line-height: 1.7;
        }

        .publication-note {
            margin-top: 14px;
            color: var(--muted-text-color);
        }

        @media (max-width: 860px) {
            .publication-card {
                flex-direction: column;
            }

            .publication-media,
            .publication-body {
                width: 100%;
                flex-basis: auto;
            }

            .publication-media {
                aspect-ratio: 16 / 9;
            }

            .publication-title {
                font-size: 1.3rem;
            }

            .publication-authors,
            .publication-venue {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body data-page="publications">
    <div data-site-nav></div>

    <main>
        <section class="page-section">
            <div class="container">
                <h1 class="page-title">Publications</h1>
                <p class="page-subtitle">Selected papers presented in a visual lab-style layout with preview figures and direct links.</p>
                <div class="filter-bar" id="publicationFilters"></div>
                <div id="publicationsContainer"></div>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script src="js/site.js"></script>
    <script src="js/publication.js?v=20260502"></script>
</body>
</html>
