<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Publications - CARE Lab</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/publications.css">
</head>
<body data-page="publications">
    <div data-site-nav></div>

    <main>
        <section class="page-section">
            <div class="container">
                <h1 class="page-title">Publications</h1>
                <p class="page-subtitle">Selected papers presented in a visual lab-style layout with preview figures and direct links.</p>
                <div class="pub-toolbar">
                    <div class="pub-search">
                        <svg class="pub-search__icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        <input type="search" id="pubSearch" class="pub-search__input" placeholder="Search by title, author, or keyword…" autocomplete="off">
                    </div>
                    <div class="filter-bar" id="publicationFilters"></div>
                </div>
                <div id="publicationsContainer"></div>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script src="js/site.js"></script>
    <script src="js/publication.js?v=20260603"></script>
</body>
</html>
