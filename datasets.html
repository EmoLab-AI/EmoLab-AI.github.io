<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datasets - EmoLab-AI</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .dataset-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .dataset-card {
            display: flex;
            gap: 24px;
            padding: 22px;
            align-items: stretch;
            overflow: hidden;
        }

        .dataset-image {
            width: 40%;
            flex: 0 0 40%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            background: transparent;
            border: 0;
            border-radius: 0;
            padding: 0;
        }

        .dataset-info {
            width: 60%;
            flex: 0 0 60%;
            padding: 0;
            min-width: 0;
        }

        .dataset-title {
            margin: 0 0 14px;
            font-size: clamp(1.28rem, 1.65vw, 1.72rem);
            line-height: 1.3;
            letter-spacing: -0.01em;
            color: #1d2740;
            font-family: Georgia, "Times New Roman", serif;
            font-weight: 400;
        }

        .dataset-description {
            margin: 0 0 18px;
            color: var(--muted-text-color);
            line-height: 1.7;
        }

        .dataset-stats,
        .dataset-tags,
        .dataset-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dataset-stats {
            margin-bottom: 14px;
        }

        .stat-item,
        .dataset-tag {
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--surface-color);
            font-size: 0.9rem;
        }

        .dataset-links {
            margin-top: 16px;
        }

        .dataset-link {
            color: var(--secondary-color);
            text-decoration: none;
        }

        @media (max-width: 860px) {
            .dataset-card {
                flex-direction: column;
            }

            .dataset-image,
            .dataset-info {
                width: 100%;
                flex-basis: auto;
            }

            .dataset-image {
                aspect-ratio: 16 / 9;
            }
        }
    </style>
</head>
<body data-page="datasets">
    <div data-site-nav></div>

    <main>
        <section class="page-section">
            <div class="container">
                <h1 class="page-title">Datasets</h1>
                <p class="page-subtitle">Curated resources for multimodal emotion analysis, biomedical sensing, and interactive AI.</p>
                <div class="filter-bar">
                    <button class="filter-btn active">All</button>
                    <button class="filter-btn">Emotion</button>
                    <button class="filter-btn">Multimodal</button>
                    <button class="filter-btn">Vision</button>
                    <button class="filter-btn">Audio</button>
                </div>
                <div class="dataset-grid"></div>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script src="js/site.js"></script>
    <script src="js/datasets.js"></script>
</body>
</html>
