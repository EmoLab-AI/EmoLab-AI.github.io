<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - EmoLab-AI</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }

        .gallery-item {
            overflow: hidden;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }

        .gallery-copy {
            padding: 18px;
        }

        .gallery-date {
            margin: 0 0 8px;
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .gallery-title {
            margin: 0 0 8px;
            font-size: 1.1rem;
            color: var(--text-color);
        }

        .gallery-description {
            margin: 0;
            color: var(--muted-text-color);
        }
    </style>
</head>
<body data-page="gallery">
    <div data-site-nav></div>

    <main>
        <section class="page-section">
            <div class="container">
                <h1 class="page-title">Gallery</h1>
                <p class="page-subtitle">Events, lab life, and milestones from the EmoLab-AI group.</p>
                <div class="filter-bar">
                    <button class="filter-btn active">All</button>
                    <button class="filter-btn">Life</button>
                    <button class="filter-btn">Events</button>
                    <button class="filter-btn">Awards</button>
                </div>
                <div class="gallery-grid"></div>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script src="js/site.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
