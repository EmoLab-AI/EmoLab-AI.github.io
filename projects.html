<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - EmoLab-AI</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .project-card {
            padding: 22px;
        }

        .project-title {
            margin: 0 0 10px;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .project-description {
            margin: 0 0 16px;
            color: var(--muted-text-color);
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .project-badge {
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--surface-color);
            font-size: 0.9rem;
        }

        .project-link {
            color: var(--secondary-color);
            text-decoration: none;
        }
    </style>
</head>
<body data-page="projects">
    <div data-site-nav></div>

    <main>
        <section class="page-section">
            <div class="container">
                <h1 class="page-title">Research Projects</h1>
                <p class="page-subtitle">Ongoing and completed efforts spanning affective computing, medical AI, and embodied systems.</p>
                <div class="filter-bar">
                    <button class="filter-btn active">All</button>
                    <button class="filter-btn">Active</button>
                    <button class="filter-btn">Completed</button>
                    <button class="filter-btn">Emotion Recognition</button>
                    <button class="filter-btn">Multimodal Learning</button>
                    <button class="filter-btn">AI Systems</button>
                </div>
                <div class="projects-grid"></div>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script src="js/site.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
